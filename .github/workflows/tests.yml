name: ASSIST Tests
on: [push, pull_request]
permissions:
  contents: read

env:
  ASSIST_DIR: ${{ github.workspace }}

jobs:
  download-ephemeris:
    runs-on: ubuntu-latest
    steps:
      - name: Cache BSP ephemeris files
        id: cache-bsp
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/data
          key: de440+linux_p1550p2650+sb441-n16

      - name: Download ephemeris data
        if: steps.cache-bsp.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${{ github.workspace }}/data
          cd ${{ github.workspace }}/data
          wget --no-verbose https://ssd.jpl.nasa.gov/ftp/eph/planets/bsp/de440.bsp
          wget --no-verbose https://ssd.jpl.nasa.gov/ftp/eph/planets/Linux/de440/linux_p1550p2650.440
          wget --no-verbose https://ssd.jpl.nasa.gov/ftp/eph/small_bodies/asteroids_de441/sb441-n16.bsp

  python-tests:
    needs: download-ephemeris
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.10"]

    steps:
      - name: Checkout ASSIST
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Restore BSP ephemeris cache
        uses: actions/cache@v5
        with:
          path: data/
          key: de440+linux_p1550p2650+sb441-n16

      - name: Install package
        run: pip install ".[server,test]"

      - name: Running unittests
        working-directory: /tmp
        run: python -m unittest discover -s "${{ github.workspace }}/assist/test" -v
        
      - name: Run integration tests
        working-directory: /tmp
        run: pytest "${{ github.workspace }}/assist/test/test_query_integration.py" -v

  c-tests:
    env:
      LD_LIBRARY_PATH: ${{ github.workspace }}/rebound/src
    needs: download-ephemeris
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test:
          - name: Reproduce Holman trajectory
            dir: holman_spk
          - name: Reproduce Holman trajectory (backwards in time)
            dir: holman_reverse_spk
          - name: Reproduce Apophis Encounter (non gravitational forces)
            dir: apophis_spk
          - name: Reproduce Ceres-5303 encounter
            dir: 5303_Ceres_spk
          - name: Test interpolation
            dir: interpolation_spk
          - name: Test onthefly interpolation
            dir: onthefly_interpolation
          - name: Test onthefly backwards interpolation
            dir: onthefly_backwards_interpolation
          - name: Test ephem_cache
            dir: ephem_cache
          - name: Test variational
            dir: variational_spk
          - name: Test roundtrip
            dir: roundtrip_spk
          - name: Test roundtrip adaptive
            dir: roundtrip_adaptive_spk
          - name: Convert to REBOUND
            dir: convert_simulation_spk
          - name: Run benchmark
            dir: benchmark
          - name: Test Loading Spice Kernels
            dir: spk_init
          - name: Test Loading Constants from Planet SPK
            dir: spk_load_constants
          - name: Test Joining Mass Data from SPK
            dir: spk_join_masses
          - name: Test SPK planets position evaluation
            dir: spk_planets_calc
          - name: Test ephemeris format detection
            dir: format_detection
          - name: Test SPK vs ASCII-derived binary detection
            dir: spk_detection
          - name: Test ASCII-derived binary init/constants
            dir: ascii_init_constants
          - name: Test ASCII source rejection
            dir: ascii_reject

    steps:
      - name: Checkout ASSIST
        uses: actions/checkout@v6

      - name: Checkout REBOUND
        uses: actions/checkout@v6
        with:
          repository: hannorein/rebound
          path: rebound
          ref: v4.6

      - name: Restore BSP ephemeris cache
        uses: actions/cache@v5
        with:
          path: data/
          key: de440+linux_p1550p2650+sb441-n16

      - name: ${{ matrix.test.name }}
        working-directory: unit_tests/${{ matrix.test.dir }}/
        run: make REB_DIR="${{ github.workspace }}/rebound" && ./rebound