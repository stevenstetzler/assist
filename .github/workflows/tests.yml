name: ASSIST Tests
on: [push, pull_request]
permissions:
  contents: read

jobs:
  download-ephemeris:
    runs-on: ubuntu-latest
    steps:
      - name: Cache BSP ephemeris files
        id: cache-bsp
        uses: actions/cache@v5
        with:
          path: data
          key: de440+linux_p1550p2650+sb441-n16

      - name: Download ephemeris data
        if: steps.cache-bsp.outputs.cache-hit != 'true'
        run: |
          mkdir -p data
          cd data
          wget --no-verbose https://ssd.jpl.nasa.gov/ftp/eph/planets/bsp/de440.bsp
          wget --no-verbose https://ssd.jpl.nasa.gov/ftp/eph/planets/Linux/de440/linux_p1550p2650.440
          wget --no-verbose https://ssd.jpl.nasa.gov/ftp/eph/small_bodies/asteroids_de441/sb441-n16.bsp

  python-tests:
    needs: download-ephemeris
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout ASSIST
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Restore BSP ephemeris cache
        uses: actions/cache@v5
        with:
          path: data
          key: de440+linux_p1550p2650+sb441-n16

      - name: Install package
        run: pip install ".[server,test]"

      - name: Running unittests
        env:
          ASSIST_DIR: ${{ github.workspace }}
        working-directory: /tmp
        run: python -m unittest discover -s "${{ github.workspace }}/assist/test" -v
        
      - name: Run integration tests
        working-directory: /tmp
        run: pytest "${{ github.workspace }}/assist/test/test_query_integration.py" -v

  c-tests:
    env:
      LD_LIBRARY_PATH: ${{ github.workspace }}/rebound/src
      REB_DIR: ${{ github.workspace }}/rebound
    needs: download-ephemeris
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ASSIST
        uses: actions/checkout@v6

      - name: Checkout REBOUND
        uses: actions/checkout@v6
        with:
          repository: hannorein/rebound
          path: rebound
          ref: 4.6.0

      - name: Restore BSP ephemeris cache
        uses: actions/cache@v5
        with:
          path: data
          key: de440+linux_p1550p2650+sb441-n16

      - name: Reproduce Holman trajectory
        working-directory: unit_tests/holman_spk/
        run: |
          make && ./rebound

      - name: Reproduce Holman trajectory (backwards in time)
        working-directory: unit_tests/holman_reverse_spk/
        run: make && ./rebound

      - name: Reproduce Apophis Encounter (non gravitational forces)
        working-directory: unit_tests/apophis_spk/
        run: make && ./rebound

      - name: Reproduce Ceres-5303 encounter
        working-directory: unit_tests/5303_Ceres_spk/
        run: make && ./rebound

      - name: Test interpolation
        working-directory: unit_tests/interpolation_spk/
        run: make && ./rebound

      - name: Test onthefly interpolation
        working-directory: unit_tests/onthefly_interpolation/
        run: make && ./rebound

      - name: Test onthefly backwards interpolation
        working-directory: unit_tests/onthefly_backwards_interpolation/
        run: make && ./rebound

      - name: Test ephem_cache
        working-directory: unit_tests/ephem_cache/
        run: make && ./rebound

      - name: Test variational
        working-directory: unit_tests/variational_spk/
        run: make && ./rebound

      - name: Test roundtrip
        working-directory: unit_tests/roundtrip_spk/
        run: make && ./rebound

      - name: Test roundtrip adaptive
        working-directory: unit_tests/roundtrip_adaptive_spk/
        run: make && ./rebound

      - name: Convert to REBOUND
        working-directory: unit_tests/convert_simulation_spk/
        run: make && ./rebound

      - name: Run benchmark
        working-directory: unit_tests/benchmark/
        run: make && ./rebound

      - name: Test Loading Spice Kernels
        working-directory: unit_tests/spk_init/
        run: make && ./rebound

      - name: Test Loading Constants from Planet SPK
        working-directory: unit_tests/spk_load_constants/
        run: make && ./rebound

      - name: Test Joining Mass Data from SPK
        working-directory: unit_tests/spk_join_masses/
        run: make && ./rebound

      - name: Test SPK planets position evaluation
        working-directory: unit_tests/spk_planets_calc/
        run: make && ./rebound

      - name: Test ephemeris format detection
        working-directory: unit_tests/format_detection/
        run: make && ./rebound

      - name: Test SPK vs ASCII-derived binary detection
        working-directory: unit_tests/spk_detection/
        run: make && ./rebound

      - name: Test ASCII-derived binary init/constants
        working-directory: unit_tests/ascii_init_constants/
        run: make && ./rebound

      - name: Test ASCII source rejection
        working-directory: unit_tests/ascii_reject/
        run: make && ./rebound
